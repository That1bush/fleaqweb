<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Fleaq Entertainment</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <style>
        .filter-container { margin: 2rem 0; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; padding: 0 20px; }
        .search-bar { padding: 10px; width: 300px; border-radius: 5px; border: 1px solid var(--primary); background: #1e1e26; color: white; }
        .tag-btn { background: #333; color: white; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; transition: 0.3s; font-family: 'Orbitron', sans-serif; font-size: 0.8rem; }
        .tag-btn.active { background: var(--primary); color: black; box-shadow: 0 0 10px var(--primary); }
        
        .post-meta { font-size: 0.8rem; color: var(--primary); margin-bottom: 10px; }
        .tag-label { background: rgba(0, 212, 255, 0.1); color: var(--primary); padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; margin-right: 5px; border: 1px solid rgba(0, 212, 255, 0.3); }
        
        /* PINNED BADGE STYLE */
        .pinned-badge { background: #ffcc00; color: black; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; margin-bottom: 10px; display: inline-block; font-family: 'Orbitron'; }

        #post-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; overflow-y: auto; padding: 50px 5%; }
        .modal-content { background: #1e1e26; padding: 40px; border-radius: 10px; max-width: 800px; margin: auto; position: relative; border: 1px solid var(--primary); animation: zoomIn 0.3s ease-out forwards; }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 2rem; cursor: pointer; color: var(--secondary); line-height: 1; }
        #modal-body p { white-space: pre-line; line-height: 1.8; color: #ddd; font-size: 1.1rem; }
        
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">FLEAQ <span>ENT.</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="blog.html">Blog</a></li>
            </ul>
        </nav>
    </header>

    <section class="content-section" style="padding-top: 80px;">
        <h1 style="text-align: center; font-family: 'Orbitron'; color: white;">Fleaq Blog Page</h1>
        
        <div class="filter-container">
            <input type="text" id="searchInput" class="search-bar" placeholder="Search posts...">
            <button class="tag-btn active" onclick="filterTags('All')">All</button>
            <button class="tag-btn" onclick="filterTags('Games')">Games</button>
            <button class="tag-btn" onclick="filterTags('Animation')">Animation</button>
            <button class="tag-btn" onclick="filterTags('News')">News</button>
        </div>

        <div class="grid" id="blog-container">Loading...</div>
    </section>

    <div id="post-modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closePost()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        let allPosts = [];

        async function fetchPosts() {
            try {
                const response = await fetch('posts.json?v=' + new Date().getTime());
                allPosts = await response.json();
                
                // SORTING LOGIC: Pinned posts go to the top
                allPosts.sort((a, b) => (b.pinned === true) - (a.pinned === true));
                
                displayPosts();
            } catch (e) { 
                document.getElementById('blog-container').innerHTML = "Error loading posts."; 
            }
        }

        function displayPosts(filter = 'All', search = '') {
            const container = document.getElementById('blog-container');
            container.innerHTML = '';

            const filtered = allPosts.filter(p => {
                const matchesTag = filter === 'All' || (p.tags && p.tags.includes(filter));
                const matchesSearch = p.title.toLowerCase().includes(search.toLowerCase());
                return matchesTag && matchesSearch;
            });

            filtered.forEach((post) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openPost(post);
                card.innerHTML = `
                    ${post.pinned ? '<div class="pinned-badge">📌 PINNED</div>' : ''}
                    <div class="post-meta">By ${post.author} | ${post.date}</div>
                    <h3 style="color: var(--primary);">${post.title}</h3>
                    <p style="font-size: 0.9rem; color: #ccc;">${post.summary}</p>
                    <div style="margin-top:15px">
                        ${post.tags.map(t => `<span class="tag-label">${t}</span>`).join('')}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function openPost(post) {
            document.getElementById('modal-body').innerHTML = `
                ${post.pinned ? '<div class="pinned-badge">📌 PINNED POST</div>' : ''}
                <div class="post-meta">By ${post.author} • ${post.date}</div>
                <h1 style="color:var(--primary); font-family:'Orbitron';">${post.title}</h1>
                <p>${post.content}</p>
            `;
            document.getElementById('post-modal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closePost() { document.getElementById('post-modal').style.display = 'none'; document.body.style.overflow = 'auto'; }
        
        function filterTags(tag) {
            document.querySelectorAll('.tag-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            displayPosts(tag, document.getElementById('searchInput').value);
        }

        document.getElementById('searchInput').oninput = (e) => displayPosts('All', e.target.value);
        fetchPosts();
    </script>
</body>
</html>
